services:
  flutter-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spec_battle_flutter
    volumes:
      # プロジェクトルート全体をマウントして .git ディレクトリもコンテナ側から参照できるようにする
      - ./:/workspace
      # ホストの .gitconfig をコンテナのrootにReadOnlyでマウントし、設定を引き継ぐ
      - ~/.gitconfig:/root/.gitconfig:ro
      # Docker Desktop for MacのSSHソケットをマウント（SSH Agent Forwarding）
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      # マウントしたSSHソケットを認識させる
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
    # Flutter Web開発サーバー用のポートマッピング
    ports:
      - "8080:8080"
    working_dir: /workspace
    # コンテナを起動状態で維持する
    tty: true
    stdin_open: true
    # Mac環境でのファイル同期パフォーマンス向上のため、必要に応じて delegated 等を指定できますが、
    # 昨今のDocker Desktop（VirtioFS等）ではデフォルトでも十分高速です。
