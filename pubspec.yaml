name: spec_battle_game
description: デバイスのスペックでキャラクターを生成し対戦するモバイルゲーム

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  # battery_plus: ^7.0.0  # Web版では非対応。ネイティブアプリ実装時に復活
  audioplayers: ^6.1.0
  crypto: ^3.0.3
  # X共有で使用。対象はWeb公開（GitHub Pages）。
  # Androidネイティブビルドは compileSdk 34 / AGP 8.1+ への更新が別途必要。
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/sounds/Crimson_Gauntlet.mp3

