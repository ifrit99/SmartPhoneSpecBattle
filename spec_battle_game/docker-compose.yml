version: '3.8'

services:
  flutter-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spec_battle_flutter
    volumes:
      - .:/app
    working_dir: /app
    # コンテナを起動状態で維持する
    tty: true
    stdin_open: true
    # Mac環境でのファイル同期パフォーマンス向上のため、必要に応じて delegated 等を指定できますが、
    # 昨今のDocker Desktop（VirtioFS等）ではデフォルトでも十分高速です。
